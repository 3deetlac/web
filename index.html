<!DOCTYPE html>

<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3Dee.tlac - 3D tlač Liptov</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
    :root {
        --primary: #00e1ff; /* Jasnejšia a kontrastnejšia modrá */
        --secondary: #bd00ff; /* Jasnejšia a farebnejšia fialová */
        --bg: #030303;
    }

    /* --- MAXIMÁLNE KOMPATIBILNÉ, ALE FAREBNEJŠIE POZADIE --- */
    body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        font-family: 'Inter', sans-serif;
        background-color: var(--bg);
        /* Zvýšený kontrast a sýtosť pre farby v rohoch */
        background-image: 
            radial-gradient(circle at 10% 10%, rgba(0, 225, 255, 0.25) 0%, transparent 60%),
            radial-gradient(circle at 90% 90%, rgba(189, 0, 255, 0.25) 0%, transparent 60%),
            radial-gradient(circle at 50% 50%, #0c0c0c 0%, #030303 100%);
        background-attachment: fixed;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        overflow: hidden;
    }

    /* Jemná, nenápadná mriežka */
    .grid {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                          linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
        background-size: 50px 50px;
        z-index: 1;
        pointer-events: none;
    }

    /* --- STREDNÝ OBSAH S PRIESTOROM --- */
    .main-hero {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10;
        text-align: center;
        padding: 50px 20px; /* Viac priestoru okolo nápisu */
    }

    .brand-name {
        font-size: clamp(3rem, 12vw, 7rem); /* Mierne menší nápis pre minimalizmus */
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: -0.05em;
        margin: 0;
        /* SKLENÝ EFEKT NA TEXTE */
        background: linear-gradient(to bottom, #ffffff 40%, #aaaaaa 80%, #ffffff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        /* Jemná žiara pre hĺbku */
        text-shadow: 0 5px 15px rgba(255, 255, 255, 0.1);
    }

    .brand-sub {
        font-size: 0.85rem;
        color: #999;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-top: 15px; /* Viac priestoru */
    }

    /* --- KONTAKTNÁ ZÓNA NA JEDNOM RIADKU --- */
    .contact-footer {
        width: 100%;
        background: rgba(10, 10, 10, 0.6);
        backdrop-filter: blur(10px);
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        padding: 20px 0;
        z-index: 20;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px; /* Priestor medzi prvkami */
        flex-wrap: wrap; /* Zabezpečí zalomenie na veľmi úzkych obrazovkách */
    }

    .contact-title {
        font-size: 0.7rem;
        color: var(--primary);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.25em;
        margin-right: 10px;
    }

    .phone {
        font-size: 1.1rem;
        font-weight: 700;
        color: #fff;
        text-decoration: none;
    }

    .btn {
        padding: 8px 16px;
        border-radius: 8px;
        text-decoration: none;
        font-size: 0.8rem;
        font-weight: 600;
        background: rgba(255, 255, 255, 0.05);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.08);
        transition: 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Kalkulačka s modrým nádychom pre kontrast */
    .btn-main {
        background: rgba(0, 225, 255, 0.15);
        color: var(--primary);
        border-color: rgba(0, 225, 255, 0.2);
    }

    .btn:active {
        transform: scale(0.96);
    }

    /* Responzívnosť pre mobily */
    @media (max-width: 600px) {
        .main-hero { padding: 30px 15px; }
        .contact-footer { gap: 10px; padding: 15px; justify-content: space-around; }
        .contact-title { display: none; } /* Na mobile skryjeme názov sekcie pre miesto */
        .phone { font-size: 1rem; }
        .btn { font-size: 0.75rem; padding: 8px 12px; }
    }
</style>
</head>
<body>

<div class="grid"></div>

<main class="main-hero" id="hero">
    <h1 class="brand-name">3Dee.tlac</h1>
    <p class="brand-sub">hobby zákazková 3d tlač na liptove</p>
</main>

<footer class="contact-footer">
    <div class="contact-title">KONTAKT:</div>
    <a href="tel:+421918266290" class="phone">0918 266 290</a>
    <a href="[https://wa.me/421918266290](https://wa.me/421918266290)" target="_blank" class="btn">WhatsApp</a>
    <a href="[https://instagram.com/3dee.tlac](https://instagram.com/3dee.tlac)" target="_blank" class="btn">Instagram</a>
    <a href="kalkulacka.html" class="btn btn-main">Kalkulačka</a>
</footer>

<script>
    // Minimalistický paralax bez rizika
    document.addEventListener('mousemove', (e) => {
        const x = (e.clientX / window.innerWidth - 0.5) * 15;
        const y = (e.clientY / window.innerHeight - 0.5) * 15;
        document.getElementById('hero').style.transform = `translate(${x}px, ${y}px)`;
    });
</script>
</body>
</html>
