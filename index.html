<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3Dee.tlac - 3D tlač Liptov</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00a2ff;
            --secondary: #7000ff;
        }

        /* --- MAXIMÁLNE KOMPATIBILNÉ POZADIE --- */
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            /* Tri vrstvy farieb, ktoré sa prelínajú - toto uvidí každý */
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(0, 162, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(112, 0, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, #0a0a0a 0%, #050505 100%);
            background-attachment: fixed;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
        }

        /* Jemná mriežka ako samostatná vrstva */
        .grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
            pointer-events: none;
        }

        /* --- OBSAH --- */
        .main-hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
        }

        .brand-name {
            font-size: clamp(3.5rem, 15vw, 8rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            margin: 0;
            /* Strieborný efekt */
            background: linear-gradient(to bottom, #ffffff 50%, #aaaaaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-sub {
            font-size: 0.9rem;
            color: #888;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-top: 10px;
        }

        /* --- KONTAKTNÁ KARTA --- */
        .contact-card {
            width: 90%;
            max-width: 380px;
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 30px;
            text-align: center;
            z-index: 20;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .contact-title {
            font-size: 0.7rem;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 8px;
        }

        .phone {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            display: block;
            margin-bottom: 20px;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            background: #1a1a1a;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.2s;
        }

        .btn-main {
            grid-column: span 2;
            background: var(--primary);
            color: black;
            border: none;
        }

        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="grid"></div>

    <main class="main-hero" id="hero">
        <h1 class="brand-name">3Dee.tlac</h1>
        <p class="brand-sub">hobby zákazková 3d tlač na liptove</p>
    </main>

    <footer class="contact-card">
        <div class="contact-title">Kontaktujte ma</div>
        <a href="tel:+421918266290" class="phone">0918 266 290</a>
        <div class="btn-grid">
            <a href="https://wa.me/421918266290" class="btn">WhatsApp</a>
            <a href="https://instagram.com/3dee.tlac" class="btn">Instagram</a>
            <a href="kalkulacka.html" class="btn btn-main">Kalkulačka ceny tlače</a>
        </div>
    </footer>

    <script>
        // Úplne jednoduchý paralax bez rizika čiernej obrazovky
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            document.getElementById('hero').style.transform = `translate(${x}px, ${y}px)`;
        });
    </script>
</body>
</html>
