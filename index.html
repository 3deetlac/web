<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3Dee.tlac - 3D tlač Liptov</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #030303;
            --primary: #00a2ff;
            --secondary: #7000ff;
            --text-main: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        /* --- FIX POZADIA --- */
        .bg-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: #030303;
            overflow: hidden;
        }

        /* Definujeme štartovacie pozície škvŕn, aby nebola tma */
        .blob {
            position: absolute;
            width: 60vmax;
            height: 60vmax;
            background: var(--primary);
            filter: blur(100px);
            border-radius: 50%;
            opacity: 0.2;
            top: -10%;
            left: -10%;
            will-change: transform;
            transition: transform 0.6s cubic-bezier(0.2, 0, 0.2, 1);
        }

        .blob.second {
            background: var(--secondary);
            width: 50vmax;
            height: 50vmax;
            opacity: 0.15;
            top: 60%;
            right: -10%;
            left: auto; /* zrušenie left z prvej triedy */
        }

        .grid {
            position: absolute;
            width: 200%; height: 200%;
            top: -50%; left: -50%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotateX(60deg);
            mask-image: radial-gradient(ellipse at center, black, transparent 80%);
            pointer-events: none;
        }

        /* --- OBSAH --- */
        .main-hero {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
            z-index: 10;
            padding: 20px;
        }

        .brand-name {
            font-size: clamp(3rem, 15vw, 8rem); /* Lepšie prispôsobenie mobilom */
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            margin: 0;
            background: linear-gradient(to bottom, #fff 50%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-sub {
            font-size: clamp(0.8rem, 3vw, 1.1rem);
            color: #888;
            letter-spacing: 0.2em;
            margin-top: 5px;
            text-transform: lowercase;
        }

        /* --- KONTAKTNÉ OKNO --- */
        .contact-footer {
            width: 90%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: center;
            z-index: 100;
        }

        .contact-title {
            font-size: 0.7em;
            letter-spacing: 0.3em;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .phone-number {
            font-size: 1.5em;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            display: block;
            margin-bottom: 20px;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .contact-btn {
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 0.8em;
            font-weight: 600;
            border: 1px solid var(--glass-border);
            color: #fff;
            background: rgba(255,255,255,0.05);
            transition: 0.2s;
        }

        .btn-calc {
            grid-column: span 2;
            background: var(--primary);
            color: #000;
            border: none;
            margin-top: 5px;
        }

        .contact-btn:active { transform: scale(0.95); }

    </style>
</head>
<body>

    <div class="bg-container">
        <div class="grid"></div>
        <div id="blob1" class="blob"></div>
        <div id="blob2" class="blob second"></div>
    </div>

    <main class="main-hero" id="hero">
        <h1 class="brand-name">3Dee.tlac</h1>
        <p class="brand-sub">hobby zákazková 3d tlač na liptove</p>
    </main>

    <footer class="contact-footer">
        <div class="contact-title">Contact me</div>
        <a href="tel:+421918266290" class="phone-number">0918 266 290</a>
        <div class="btn-group">
            <a href="https://wa.me/421918266290" class="contact-btn">WhatsApp</a>
            <a href="https://instagram.com/3dee.tlac" class="contact-btn">Instagram</a>
            <a href="kalkulacka.html" class="contact-btn btn-calc">Kalkulačka ceny tlače</a>
        </div>
    </footer>

    <script>
        const hero = document.getElementById('hero');
        const b1 = document.getElementById('blob1');
        const b2 = document.getElementById('blob2');

        // Funkcia pre pohyb prvkov
        function move(x, y) {
            // Paralax pre text
            hero.style.transform = `translate(${x * 20}px, ${y * 20}px) rotateY(${x * 10}deg) rotateX(${-y * 10}deg)`;
            
            // Pohyb farebných škvŕn
            b1.style.transform = `translate(${x * 100}px, ${y * 100}px)`;
            b2.style.transform = `translate(${x * -100}px, ${y * -100}px)`;
        }

        // 1. Myš (PC)
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) - 0.5;
            const y = (e.clientY / window.innerHeight) - 0.5;
            move(x, y);
        });

        // 2. Gyroskop (Mobil - nakláňanie)
        window.addEventListener('deviceorientation', (e) => {
            if (!e.gamma) return;
            const x = e.gamma / 45; 
            const y = (e.beta - 45) / 45;
            move(x, y);
        });

        // 3. Automatická jemná animácia (aby to nebolo mŕtve, keď sa nič nehýbe)
        let time = 0;
        function animate() {
            time += 0.01;
            // Len ak nie je aktivovaný iný pohyb (veľmi jemné kmitanie)
            const ax = Math.sin(time) * 0.05;
            const ay = Math.cos(time) * 0.05;
            // b1.style.filter = `blur(${100 + Math.sin(time) * 20}px)`; // jemné pulzovanie rozmazania
            requestAnimationFrame(animate);
        }
        animate();

    </script>
</body>
</html>
