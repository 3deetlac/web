<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3Dee.tlac - 3D tlač Liptov</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #050505;
            --primary: #00a2ff;
            --secondary: #7000ff;
            --text-main: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        /* --- GARANTOVANÉ FAREBNÉ POZADIE --- */
        .bg-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: #050505;
            overflow: hidden;
        }

        /* Modrá hmlovina - Animovaná pomocou čistého CSS */
        .blob-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 70vmax;
            height: 70vmax;
            background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
            opacity: 0.3;
            filter: blur(80px);
            animation: move-1 20s infinite alternate ease-in-out;
        }

        /* Fialová hmlovina */
        .blob-2 {
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 60vmax;
            height: 60vmax;
            background: radial-gradient(circle, var(--secondary) 0%, transparent 70%);
            opacity: 0.2;
            filter: blur(80px);
            animation: move-2 25s infinite alternate ease-in-out;
        }

        /* CSS Animácie pre pohyb škvŕn */
        @keyframes move-1 {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(15%, 10%) scale(1.1); }
        }
        @keyframes move-2 {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(-15%, -10%) scale(1.2); }
        }

        .grid-overlay {
            position: absolute;
            width: 200%; height: 200%;
            top: -50%; left: -50%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotateX(60deg);
            mask-image: radial-gradient(circle, black 30%, transparent 70%);
        }

        /* --- OBSAH --- */
        .main-hero {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10;
        }

        .brand-name {
            font-size: clamp(3rem, 14vw, 8.5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            margin: 0;
            color: white;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .brand-sub {
            font-size: clamp(0.7rem, 2.5vw, 1rem);
            color: #aaa;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-top: 10px;
        }

        /* --- KONTAKTNÉ OKNO --- */
        .contact-card {
            width: 90%;
            max-width: 400px;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 40px;
            text-align: center;
            z-index: 20;
        }

        .contact-title {
            font-size: 0.7rem;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 10px;
        }

        .phone {
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            display: block;
            margin-bottom: 20px;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid var(--glass-border);
            transition: 0.3s;
        }

        .btn-main {
            grid-column: span 2;
            background: var(--primary);
            color: black;
            border: none;
        }

        .btn:active { transform: scale(0.95); }

    </style>
</head>
<body>

    <div class="bg-wrapper">
        <div class="blob-1"></div>
        <div class="blob-2"></div>
        <div class="grid-overlay"></div>
    </div>

    <main class="main-hero" id="parallax-content">
        <h1 class="brand-name">3Dee.tlac</h1>
        <p class="brand-sub">hobby zákazková 3d tlač na liptove</p>
    </main>

    <footer class="contact-card">
        <div class="contact-title">Kontaktujte ma</div>
        <a href="tel:+421918266290" class="phone">0918 266 290</a>
        <div class="btn-grid">
            <a href="https://wa.me/421918266290" class="btn">WhatsApp</a>
            <a href="https://instagram.com/3dee.tlac" class="btn">Instagram</a>
            <a href="kalkulacka.html" class="btn btn-main">Kalkulačka ceny tlače</a>
        </div>
    </footer>

    <script>
        // Len jemný paralax pre text, pozadie už beží samo cez CSS
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) - 0.5;
            const y = (e.clientY / window.innerHeight) - 0.5;
            const content = document.getElementById('parallax-content');
            content.style.transform = `translate(${x * 30}px, ${y * 30}px) rotateY(${x * 15}deg) rotateX(${-y * 15}deg)`;
        });
    </script>
</body>
</html>
