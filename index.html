<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3Dee.tlac - 3D tlač Liptov</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #030303;
            --primary: #00a2ff;
            --secondary: #7000ff; /* Fialový akcent pre hĺbku */
            --text-main: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        /* --- NOVÉ DIZAJNOVÉ POZADIE --- */
        .bg-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #0a0a0a 0%, #030303 100%);
        }

        /* Dynamické svetelné body (Mesh Gradient) */
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: var(--primary);
            filter: blur(120px);
            border-radius: 50%;
            opacity: 0.15;
            transition: transform 0.2s ease-out;
        }

        .blob.second {
            background: var(--secondary);
            width: 400px;
            height: 400px;
            opacity: 0.1;
            right: 10%;
            top: 10%;
        }

        /* Jemná mriežka pripomínajúca podložku tlačiarne */
        .grid {
            position: absolute;
            width: 200%; height: 200%;
            top: -50%; left: -50%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: rotateX(60deg) translateZ(-100px);
            mask-image: radial-gradient(ellipse at center, black, transparent 70%);
        }

        /* --- OBSAH --- */
        .main-hero {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .brand-name {
            font-size: 14vw;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            margin: 0;
            background: linear-gradient(to bottom, #fff 40%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .brand-sub {
            font-size: 1.1em;
            color: #888;
            letter-spacing: 0.2em;
            margin-top: -10px;
            text-transform: lowercase;
        }

        /* --- KONTAKTNÉ OKNO (GLASSMORPHISM) --- */
        .contact-footer {
            width: 90%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .contact-title {
            font-size: 0.7em;
            letter-spacing: 0.3em;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .phone-number {
            font-size: 1.6em;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            display: block;
            margin-bottom: 25px;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .contact-btn {
            padding: 14px;
            border-radius: 15px;
            text-decoration: none;
            font-size: 0.85em;
            font-weight: 600;
            border: 1px solid var(--glass-border);
            color: #fff;
            background: rgba(255,255,255,0.03);
            transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }

        .btn-calc {
            grid-column: span 2;
            background: var(--primary);
            color: #000;
            border: none;
        }

        .contact-btn:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="bg-container">
        <div class="grid"></div>
        <div class="blob" id="blob1"></div>
        <div class="blob second" id="blob2"></div>
    </div>

    <main class="main-hero" id="hero">
        <h1 class="brand-name">3Dee.tlac</h1>
        <p class="brand-sub">hobby zákazková 3d tlač na liptove</p>
    </main>

    <footer class="contact-footer">
        <div class="contact-title">Contact me</div>
        <a href="tel:+421918266290" class="phone-number">0918 266 290</a>
        <div class="btn-group">
            <a href="https://wa.me/421918266290" class="contact-btn">WhatsApp</a>
            <a href="https://instagram.com/3dee.tlac" class="contact-btn">Instagram</a>
            <a href="kalkulacka.html" class="contact-btn btn-calc">Kalkulačka ceny tlače</a>
        </div>
    </footer>

    <script>
        // Jemný paralax efekt na pohyb myši
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) - 0.5;
            const y = (e.clientY / window.innerHeight) - 0.5;

            // Pohyb textu
            document.getElementById('hero').style.transform = 
                `rotateY(${x * 20}deg) rotateX(${-y * 20}deg) translateZ(50px)`;

            // Pohyb svetelných škvŕn v pozadí
            document.getElementById('blob1').style.transform = 
                `translate(${x * 100}px, ${y * 100}px)`;
            document.getElementById('blob2').style.transform = 
                `translate(${x * -150}px, ${y * -150}px)`;
        });

        // Podpora pre nakláňanie mobilu (ak je dostupné)
        window.addEventListener('deviceorientation', (e) => {
            const x = e.gamma / 45; // náklon do strán
            const y = e.beta / 45;  // náklon dopredu/dozadu
            document.getElementById('hero').style.transform = 
                `rotateY(${x * 20}deg) rotateX(${-y * 20}deg) translateZ(50px)`;
        });
    </script>
</body>
</html>
