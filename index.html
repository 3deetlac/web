<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3Dee.tlac - Hobby 3D tlač Liptov</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* --- CSS PREMENNÉ --- */
        :root {
            --bg-center: #000000; /* Maximálny kontrast */
            --bg-edge: #080808; 
            --text-main: #ffffff;
            --text-sub: #888888;
            --primary: #00e1ff; /* Jasná neónová modrá */
            --secondary: #bd00ff; /* Jasná neónová fialová */
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(255, 255, 255, 0.03); /* Pre sklenený efekt karty */
            --font-stack: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        body {
            font-family: var(--font-stack);
            background-color: var(--bg-center);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden; /* Paralax cez JS */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            perspective: 1000px;
            
            /* MAXIMÁLNE KONTRASTNÉ A NEÓNOVÉ POZADIE */
            background-image: 
                radial-gradient(circle at 5% 5%, rgba(0, 225, 255, 0.35) 0%, transparent 55%),
                radial-gradient(circle at 95% 95%, rgba(189, 0, 255, 0.35) 0%, transparent 55%),
                radial-gradient(circle at 50% 50%, var(--bg-edge) 0%, var(--bg-center) 100%);
            background-attachment: fixed;
        }

        /* Jemná technická mriežka */
        .grid-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--border) 1px, transparent 1px),
                              linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
            pointer-events: none;
            opacity: 0.4;
        }

        /* --- STREDOVÝ OBSAH --- */
        .main-hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            transform-style: preserve-3d;
            will-change: transform;
            z-index: 10;
        }

        .brand-name {
            font-size: clamp(2.5rem, 11vw, 6.5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            line-height: 0.9;
            margin-bottom: 15px;
            
            /* SKLENÝ EFEKT NA TEXTE */
            background: linear-gradient(135deg, rgba(255,255,255,1) 30%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,1) 70%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px rgba(255,255,255,0.15));
            
            transform: translateZ(50px);
        }

        .brand-sub {
            font-size: 0.8rem;
            color: var(--text-sub);
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.35em;
            transform: translateZ(30px);
        }

        /* --- "PLÁVAJÚCA" KONTAKTNÁ KARTA (FIX PRE MOBIL) --- */
        .contact-card {
            width: 90%;
            max-width: 420px; /* Pre PC ostane úzka */
            background: var(--glass); /* Sklenený efekt */
            backdrop-filter: blur(20px); /* Silnejšie rozostrenie pre čitateľnosť */
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 25px; /* Zaoblené rohy pre eleganciu */
            padding: 25px; /* Viac priestoru vo vnútri */
            margin-bottom: 50px; /* VÄČŠÍ ODSTUP OD SPODNÉHO OKRAJA (SAFE ZONE) */
            z-index: 20;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); /* Tieň pre hĺbku */
        }

        .contact-title {
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            margin-bottom: 15px;
            display: block;
        }

        .phone {
            font-size: 1.5rem; /* Zväčšený telefón pre lepšiu čitateľnosť */
            font-weight: 700;
            color: var(--text-main);
            text-decoration: none;
            display: block;
            margin-bottom: 25px;
        }

        /* Usporiadanie tlačidiel do mriežky */
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 stĺpce vedľa seba */
            gap: 12px; /* Dostatočná medzera */
        }

        .contact-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 15px; /* ZVÄČŠENÝ PADDING PRE LEPŠIE KLIKANIE PRSTOM */
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.2s ease;
        }

        .contact-btn:hover, .contact-btn:active {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px); /* Jemný pohyb hore pre spätnú väzbu */
        }

        /* Kalkulačka s modrým nádychom */
        .btn-calc {
            grid-column: span 2; /* Na šírku oboch stĺpcov */
            background: rgba(0, 225, 255, 0.1);
            color: var(--primary);
            border-color: rgba(0, 225, 255, 0.25);
            margin-top: 5px;
        }

        /* --- ODPOVEDNOSŤ PRE MOBIL (MAXIMÁLNA FUNKČNOSŤ) --- */
        @media (max-width: 600px) {
            .main-hero { padding: 40px 10px; }
            .brand-name { font-size: 17vw; } /* Ešte o niečo väčší na mobile */
            .brand-sub { font-size: 0.75rem; letter-spacing: 0.3em; }

            .contact-card {
                width: 92%; /* Trochu širšia na mobile */
                padding: 20px; /* Menší padding na mobile */
                margin-bottom: 40px; /* STÁLE DOSTATOČNÝ ODSTUP (SAFE ZONE) */
            }
            
            .phone { font-size: 1.3rem; margin-bottom: 20px; } /* Mierne menší telefón */
            
            .contact-btn {
                padding: 14px; /* Stále veľká plocha na kliknutie */
                font-size: 0.8rem; /* Mierne menší font pre kompaktnosť */
            }
        }
    </style>
</head>
<body>

    <div class="grid-overlay"></div>

    <main class="main-hero" id="hero">
        <h1 class="brand-name">3Dee.tlač</h1>
        <p class="brand-sub">hobby zákazková 3d tlač na liptove</p>
    </main>

    <footer class="contact-card">
        <span class="contact-title">KONTAKT</span>
        
        <a href="tel:+421918266290" class="phone">0918 266 290</a>
        
        <div class="btn-group">
            <a href="https://wa.me/421918266290" target="_blank" class="contact-btn">WhatsApp</a>
            <a href="https://instagram.com/3dee.tlac" target="_blank" class="contact-btn">Instagram</a>
            <a href="https://3deetlac.github.io/calc/" target="_blank" class="contact-btn btn-calc">3dee calc</a>
        </div>
    </footer>

    <script>
        const hero = document.getElementById('hero');

        // Jemnejší pohyb pre minimalizmus
        const intensity = 8; 

        function applyParallax(e) {
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);

            if (!x || !y) return; 

            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            const moveX = (x - centerX) / centerX;
            const moveY = (y - centerY) / centerY;

            const rotateX = moveY * intensity;
            const rotateY = -moveX * intensity;
            hero.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateX(${moveX * 4}px) translateY(${moveY * 4}px)`;
        }

        window.addEventListener('mousemove', applyParallax);
        window.addEventListener('touchmove', applyParallax);
        
        function resetPosition() {
            hero.style.transform = `rotateX(0) rotateY(0) translateX(0) translateY(0)`;
        }

        window.addEventListener('mouseleave', resetPosition);
        window.addEventListener('touchend', resetPosition);
    </script>
</body>
</html>
