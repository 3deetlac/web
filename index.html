<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3Dee.tlac - Hobby 3D tlač Liptov</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* --- CSS PREMENNÉ A RESET --- */
        :root {
            --bg: #050505; /* Hlboká čierna pre pozadie */
            --card: #111111; /* Mierne svetlejšia pre kontaktné okno */
            --text-main: #ffffff;
            --text-sub: #888888;
            --primary: #00a2ff; /* Tvoja modrá */
            --primary-dim: rgba(0, 162, 255, 0.1);
            --border: #222222;
            --font-stack: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        body {
            font-family: var(--font-stack);
            background-color: var(--bg);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden; /* Paralax efekt riešime cez JS a transformácie, nie scroll */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            perspective: 1000px; /* Nutné pre 3D efekt */
        }

        /* --- ABSTRAKTNÉ 3D POZADIE (VRSTVY TLAČE) --- */
        .background-scene {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            transform-style: preserve-3d;
            will-change: transform;
        }

        /* Generujeme "vrstvy G-codu" pomocou CSS gradientov */
        .bg-layer {
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px; /* Mriežka tlačovej podložky */
            background-position: center;
            opacity: 0.15;
            transform: translateZ(-200px) rotateX(60deg);
        }

        .bg-glow {
            position: absolute;
            top: 50%; left: 50%;
            width: 30vmax; height: 30vmax;
            background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0.1;
            filter: blur(50px);
            transform: translate(-50%, -50%) translateZ(-100px);
        }

        /* --- HLAVNÝ OBSAH (STRED) --- */
        .main-hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .brand-name {
            font-size: 12vw; /* Responzívna veľkosť podľa šírky okna */
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            line-height: 0.9;
            margin-bottom: 10px;
            /* Jemný 3D tieň pre nápis */
            text-shadow: 
                0 1px 0 #ccc, 0 2px 0 #c9c9c9, 0 3px 0 #bbb,
                0 4px 0 #b9b9b9, 0 5px 0 #aaa, 
                0 6px 1px rgba(0,0,0,.1), 0 0 5px rgba(0,0,0,.1),
                0 1px 3px rgba(0,0,0,.3), 0 3px 5px rgba(0,0,0,.2),
                0 5px 10px rgba(0,0,0,.25), 0 10px 10px rgba(0,0,0,.2),
                0 20px 20px rgba(0,0,0,.15);
            color: var(--text-main);
            transform: translateZ(50px); /* Vystúpenie nápisu do popredia */
        }

        .brand-sub {
            font-size: 1em;
            color: var(--text-sub);
            font-weight: 400;
            text-transform: lowercase;
            letter-spacing: 0.1em;
            transform: translateZ(30px); /* Mierne menej vystúpené ako hlavný nápis */
        }

        /* --- KONTAKTNÁ ZÓNA (DOLE) --- */
        .contact-footer {
            width: 100%;
            max-width: 450px; /* Aby okno nebolo príliš široké na PC */
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px 20px 0 0; /* Zaoblené len horné rohy */
            padding: 25px;
            text-align: center;
            backdrop-filter: blur(10px); /* Jemné rozostrenie pozadia pod oknom */
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            transform: translateZ(20px); /* Jemné vystúpenie */
        }

        .contact-title {
            font-size: 0.75em;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 15px;
        }

        .phone-number {
            font-size: 1.4em;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 20px;
            display: block;
            text-decoration: none;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        /* Prepnutie na 2 stĺpce na širších mobiloch */
        @media (min-width: 400px) {
            .btn-group { grid-template-columns: 1fr 1fr; }
            .btn-calc { grid-column: span 2; } /* Kalkulačka na celú šírku */
        }

        .contact-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #1a1a1a;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85em;
            transition: all 0.2s ease;
        }

        .contact-btn:active {
            transform: scale(0.97); /* Efekt stlačenia na mobile */
            background: #222;
        }

        /* Špecifické farby pre tlačidlá */
        .btn-wa { border-color: #25D366; color: #25D366; background: rgba(37, 211, 102, 0.05); }
        .btn-ig { border-color: #E1306C; color: #E1306C; background: rgba(225, 48, 108, 0.05); }
        .btn-calc { border-color: var(--primary); color: var(--primary); background: var(--primary-dim); margin-top: 5px;}

        /* --- ODPOVEDNOSŤ NA MOBIL (DODATOČNÉ ÚPRAVY) --- */
        @media (max-width: 600px) {
            .brand-name { font-size: 16vw; } /* Ešte väčší nápis na výšku */
            .brand-sub { font-size: 0.8em; }
            .contact-footer { padding: 20px; width: 95%; margin: 0 auto; }
            .phone-number { font-size: 1.2em; }
        }

        /* Zákaz paralax efektu pre užívateľov, ktorí preferujú obmedzený pohyb (prístupnosť) */
        @media (prefers-reduced-motion: reduce) {
            .background-scene, .main-hero, .brand-name, .brand-sub {
                transform: none !important;
                transition: none !important;
            }
        }
    </style>
</head>
<body>

    <script>
        const body = document.body;
        const bgScene = document.getElementById('bgScene');
        const heroContent = document.getElementById('heroContent');

        // Intenzita pohybu (čím menšie číslo, tým jemnejší pohyb)
        const intensityBg = 20; 
        const intensityHero = 10;

        // Funkcia pre výpočet a aplikáciu 3D transformácie
        function applyParallax(e) {
            // Získame pozíciu kurzora/prsta relatívne k stredu obrazovky
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);

            if (!x || !y) return; // Ochrana ak dáta chýbajú

            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            // Výpočet odchýlky od stredu (-1 až 1)
            const moveX = (x - centerX) / centerX;
            const moveY = (y - centerY) / centerY;

            // Aplikácia rotácie pre pozadie (jemný náklon)
            const rotateXBg = moveY * intensityBg;
            const rotateYBg = -moveX * intensityBg;
            // Presunieme pozadie jemne do opačnej strany ako myš pre pocit hĺbky
            bgScene.style.transform = `translateX(${moveX * -30}px) translateY(${moveY * -30}px) rotateX(${rotateXBg}deg) rotateY(${rotateYBg}deg)`;

            // Aplikácia rotácie a mierneho posunu pre hlavný obsah
            const rotateXHero = moveY * intensityHero;
            const rotateYHero = -moveX * intensityHero;
            heroContent.style.transform = `rotateX(${rotateXHero}deg) rotateY(${rotateYHero}deg) translateX(${moveX * 10}px) translateY(${moveY * 10}px)`;
        }

        // --- EVENT LISTENERS (POHYB) ---
        
        // Pre PC (pohyb myšou)
        window.addEventListener('mousemove', applyParallax);

        // Pre Mobily (pohyb prstom / gyroskop - volíme prst pre lepšiu kontrolu)
        // Gyroskop (deviceorientation) často vyžaduje HTTPS a povolenie od užívateľa,
        // preto je dotyk (touchmove) spoľahlivejší pre basic verziu.
        window.addEventListener('touchmove', applyParallax);
        
        // Reset pozície pri odchode myšou/konci dotyku
        function resetPosition() {
            bgScene.style.transform = `translateX(0) translateY(0) rotateX(0) rotateY(0)`;
            heroContent.style.transform = `rotateX(0) rotateY(0) translateX(0) translateY(0)`;
        }

        window.addEventListener('mouseleave', resetPosition);
        window.addEventListener('touchend', resetPosition);

        // Zamedzenie scrollovania na mobile pri pohybe prstom
        window.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

    </script>
</body>
