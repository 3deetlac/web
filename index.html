<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3Dee.tlac - Hobby 3D tlač Liptov</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-center: #000000;
            --bg-edge: #080808; 
            --text-main: #ffffff;
            --text-sub: #888888;
            --primary: #00e1ff; 
            --secondary: #bd00ff; 
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(255, 255, 255, 0.03);
            --font-stack: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        body {
            font-family: var(--font-stack);
            background-color: var(--bg-center);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            perspective: 1000px;
            
            /* ULTRA KONTRASTNÉ NEÓNOVÉ POZADIE */
            background-image: 
                radial-gradient(circle at 5% 5%, rgba(0, 225, 255, 0.4) 0%, transparent 55%),
                radial-gradient(circle at 95% 95%, rgba(189, 0, 255, 0.4) 0%, transparent 55%),
                radial-gradient(circle at 50% 50%, var(--bg-edge) 0%, var(--bg-center) 100%);
            background-attachment: fixed;
        }

        .grid-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--border) 1px, transparent 1px),
                              linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
            pointer-events: none;
            opacity: 0.4;
        }

        .main-hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            transform-style: preserve-3d;
            will-change: transform;
            z-index: 10;
        }

        .brand-name {
            font-size: clamp(2.8rem, 12vw, 7rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            line-height: 0.85;
            margin-bottom: 20px;
            
            /* SKLENÝ EFEKT */
            background: linear-gradient(135deg, rgba(255,255,255,1) 30%, rgba(255,255,255,0.5) 50%, rgba(255,255,255,1) 70%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
            
            transform: translateZ(60px);
        }

        /* ODSKOK O JEDNO PÍSMENO (cca 1.1em) */
        .indent {
            display: inline-block;
            margin-left: 1.1em;
        }

        .brand-sub {
            font-size: 0.8rem;
            color: var(--text-sub);
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.35em;
            transform: translateZ(30px);
        }

        .contact-card {
            width: 90%;
            max-width: 420px; 
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 50px;
            z-index: 20;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .contact-title {
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            margin-bottom: 15px;
            display: block;
        }

        .phone {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            text-decoration: none;
            display: block;
            margin-bottom: 25px;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .contact-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.2s ease;
        }

        .contact-btn:hover, .contact-btn:active {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .btn-calc {
            grid-column: span 2;
            background: rgba(0, 225, 255, 0.12);
            color: var(--primary);
            border-color: rgba(0, 225, 255, 0.3);
            margin-top: 5px;
        }

        /* RESPONZIVITA PRE MOBIL */
        @media (max-width: 600px) {
            .brand-name { font-size: 16vw; }
            .contact-card {
                width: 92%;
                margin-bottom: 80px; /* VYŠŠIE PRE SAFE ZONE */
                padding: 20px;
            }
            .phone { font-size: 1.3rem; }
            .contact-btn { padding: 14px; font-size: 0.8rem; }
            /* Na mobile o niečo menší odskok kvôli šírke displeja */
            .indent { margin-left: 0.8em; }
        }
    </style>
</head>
<body>

    <div class="grid-overlay"></div>

    <main class="main-hero" id="hero">
        <h1 class="brand-name">3DEE.<br><span class="indent">TLAČ</span></h1>
        <p class="brand-sub">hobby zákazková 3d tlač na liptove</p>
    </main>

    <footer class="contact-card">
        <span class="contact-title">KONTAKT</span>
        <a href="tel:+421918266290" class="phone">0918 266 290</a>
        <div class="btn-group">
            <a href="https://wa.me/421918266290" target="_blank" class="contact-btn">WhatsApp</a>
            <a href="https://instagram.com/3dee.tlac" target="_blank" class="contact-btn">Instagram</a>
            <a href="https://3deetlac.github.io/calc/" target="_blank" class="contact-btn btn-calc">3dee calc</a>
        </div>
    </footer>

    <script>
        const hero = document.getElementById('hero');
        const intensity = 10; 

        function applyParallax(xValue, yValue) {
            const rotateX = yValue * intensity;
            const rotateY = -xValue * intensity;
            hero.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateX(${xValue * 6}px) translateY(${yValue * 6}px)`;
        }

        // PC MOUSE CONTROL
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth > 600) {
                const moveX = (e.clientX - window.innerWidth / 2) / (window.innerWidth / 2);
                const moveY = (e.clientY - window.innerHeight / 2) / (window.innerHeight / 2);
                applyParallax(moveX, moveY);
            }
        });

        // MOBILE GYROSCOPE CONTROL
        window.addEventListener('deviceorientation', (e) => {
            if (e.gamma !== null && window.innerWidth <= 600) {
                let moveX = e.gamma / 40; 
                let moveY = (e.beta - 45) / 40; 

                moveX = Math.max(-1, Math.min(1, moveX));
                moveY = Math.max(-1, Math.min(1, moveY));

                applyParallax(moveX, moveY);
            }
        });

        function resetPosition() {
            hero.style.transform = `rotateX(0) rotateY(0) translateX(0) translateY(0)`;
        }

        window.addEventListener('mouseleave', resetPosition);
        window.addEventListener('touchend', resetPosition);
    </script>
</body>
</html>
